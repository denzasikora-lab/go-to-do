# Local stack: Postgres plus the Telegram bot container.
# Requires a .env file (see .env.example). On macOS without Docker Desktop, run a VM engine
# (e.g. Colima: `colima start`) so `docker compose` can reach the daemon.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todobot
      POSTGRES_PASSWORD: todobot
      POSTGRES_DB: todobot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todobot -d todobot"]
      interval: 3s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
